bundle:
  name: cost-obs-lakebase

targets:
  prod:
    mode: production

# =============================================================================
# Lakebase Autoscaling resources
# =============================================================================
resources:
  postgres_projects:
    cost_obs_lb_project:
      project_id: cost-obs-lakebase
      display_name: "Cost Observability Lakebase"
      pg_version: 17

  postgres_branches:
    cost_obs_lb_prod_branch:
      parent: ${resources.postgres_projects.cost_obs_lb_project.id}
      branch_id: production

  postgres_endpoints:
    cost_obs_lb_prod_rw:
      parent: ${resources.postgres_branches.cost_obs_lb_prod_branch.id}
      endpoint_id: prod-rw
      endpoint_type: ENDPOINT_TYPE_READ_WRITE
      autoscaling_limit_min_cu: 1
      autoscaling_limit_max_cu: 4

# =============================================================================
# Databricks App — deployed from Git, bound to Lakebase + SQL Warehouse
# =============================================================================
  apps:
    cost_obs_app:
      name: cost-obs
      description: "Cost Observability & Control with Lakebase"

      resources:
        - name: lakebase-db
          description: "Lakebase RW endpoint for materialized query results"
          postgres:
            database: ${resources.postgres_branches.cost_obs_lb_prod_branch.id}
            permission: CAN_CONNECT_AND_CREATE

      git_repository:
        url: https://github.com/smathews13/cost-obs-lakebase
        provider: gitHub

      git_source:
        branch: main
