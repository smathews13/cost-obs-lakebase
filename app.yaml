command: ["uvicorn", "server.app:app", "--host", "0.0.0.0", "--port", "8000"]

# =============================================================================
# Primary deployment: Databricks Asset Bundle (recommended)
# =============================================================================
#
#   databricks bundle deploy -t prod \
#     --var="warehouse_id=<your-warehouse-id>"
#
# The bundle (databricks.yml) provisions the Lakebase Autoscaling instance,
# creates the postgres project/branch/endpoint, and deploys this app from
# https://github.com/smathews13/cost-obs-lakebase (branch: main).
# All resource bindings (Lakebase + SQL Warehouse) are declared in databricks.yml.
# After bundle deploy, start the app with:
#
#   databricks bundle run cost_obs_app -t prod
#
# =============================================================================
# Manual / UI deployment (fallback — no bundle)
# =============================================================================
#
# 1. App resources → + Add resource → SQL warehouse
#    Key: sql-warehouse, Permission: Can use
# 2. App resources → + Add resource → Lakebase database
#    Key: lakebase-db, Permission: CAN_CONNECT_AND_CREATE
# 3. User authorization → + Add scope → sql (optional but recommended)
#
# =============================================================================

resources:
  - name: sql-warehouse
    description: SQL Warehouse for cost observability queries
    sql_warehouse:
      permission: CAN_USE
  - name: lakebase-db
    description: Lakebase RW endpoint for materialized query results
    postgres:
      permission: CAN_CONNECT_AND_CREATE

env:
  # Injected automatically by Databricks Apps from the sql-warehouse resource above.
  # Do not set this manually if you configured a warehouse resource in the UI.
  - name: DATABRICKS_WAREHOUSE_ID
    valueFrom: sql-warehouse

  # Unity Catalog location for materialized views (defaults: main / cost_obs)
  - name: COST_OBS_CATALOG
    value: main
  - name: COST_OBS_SCHEMA
    value: cost_obs

  # Optional: uncomment to point at a specific warehouse instead of the resource above
  # - name: DATABRICKS_HTTP_PATH
  #   value: /sql/1.0/warehouses/<id>

  # Genie Space for AI cost queries (optional)
  # - name: GENIE_SPACE_ID
  #   value: <genie-space-id>

  # Azure subscription ID (shown in account banner on Azure workspaces)
  # - name: AZURE_SUBSCRIPTION_ID
  #   value: <subscription-id>

  # Lakebase — PGHOST / PGDATABASE / PGPORT / PGSSLMODE / PGUSER are injected
  # automatically by the Apps runtime from the lakebase-db resource binding.
  # LAKEBASE_ENDPOINT resolves to the endpoint path via valueFrom so
  # generate_database_credential(endpoint=...) always gets the correct bound endpoint.
  - name: LAKEBASE_ENDPOINT
    valueFrom: lakebase-db

  # AWS / Azure actual cost tables (defaults: billing.aws / billing.azure)
  # - name: AWS_COST_CATALOG
  #   value: billing
  # - name: AWS_COST_SCHEMA
  #   value: aws
  # - name: AZURE_COST_CATALOG
  #   value: billing
  # - name: AZURE_COST_SCHEMA
  #   value: azure
